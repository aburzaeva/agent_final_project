[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'python -m src.mcp_server.server & streamlit run src/ui/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true'"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
